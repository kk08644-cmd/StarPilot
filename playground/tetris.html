<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 俄羅斯方塊遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 15px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 5px;
            min-width: 140px;
            border-left: 3px solid #00d9ff;
        }

        .info-label {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .info-value {
            color: #00d9ff;
            font-weight: bold;
            font-size: 1.6em;
            margin-top: 5px;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        canvas {
            border: 3px solid #00d9ff;
            background: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4),
                        inset 0 0 10px rgba(0, 217, 255, 0.1);
            image-rendering: pixelated;
        }

        .next-piece {
            min-width: 140px;
        }

        .next-piece h3 {
            margin-bottom: 10px;
            font-size: 1.1em;
            color: #00d9ff;
        }

        #nextCanvas {
            border: 2px solid #666;
            background: #0a0e27;
            display: block;
            margin: 0 auto;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .keyboard-info {
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            background: #00d9ff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #00ffff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status {
            margin-top: 15px;
            font-size: 1.1em;
            min-height: 30px;
            color: #ffff00;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }

        .game-over {
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            canvas {
                max-width: 100%;
                height: auto;
            }

            .game-info {
                flex-direction: column;
                gap: 10px;
            }

            .game-wrapper {
                flex-direction: column;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 俄羅斯方塊</h1>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">分數</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">等級</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">消除行數</div>
                <div class="info-value" id="lines">0</div>
            </div>
        </div>

        <div class="game-wrapper">
            <div>
                <canvas id="gameCanvas" width="200" height="400"></canvas>
            </div>
            <div class="next-piece">
                <h3>下一個</h3>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
        </div>

        <div class="controls">
            <div class="keyboard-info">
                <p>⬅️ 左移 / ➡️ 右移 / ⬇️ 加速</p>
                <p>🔄 空格 旋轉 / P 暫停</p>
            </div>
        </div>

        <div class="button-group">
            <button id="startBtn" onclick="startGame()">開始遊戲</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>暫停</button>
            <button onclick="resetGame()">重新開始</button>
        </div>

        <div class="status" id="status">準備好了，點擊「開始遊戲」開始！</div>
    </div>

    <script>
        // 遊戲配置
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 20;

        // 俄羅斯方塊形狀定義
        const TETRIS_SHAPES = [
            // I 型
            [
                [1, 1, 1, 1]
            ],
            // O 型
            [
                [1, 1],
                [1, 1]
            ],
            // T 型
            [
                [0, 1, 0],
                [1, 1, 1]
            ],
            // L 型
            [
                [1, 0],
                [1, 0],
                [1, 1]
            ],
            // J 型
            [
                [0, 1],
                [0, 1],
                [1, 1]
            ],
            // S 型
            [
                [0, 1, 1],
                [1, 1, 0]
            ],
            // Z 型
            [
                [1, 1, 0],
                [0, 1, 1]
            ]
        ];

        const COLORS = [
            '#FF6B6B', // 紅
            '#4ECDC4', // 青綠
            '#45B7D1', // 藍
            '#FFA07A', // 橙
            '#98D8C8', // 薄荷綠
            '#F7DC6F', // 黃
            '#BB8FCE'  // 紫
        ];

        let gameBoard = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let dropCounter = 0;
        let dropInterval = 1000;

        const gameCanvas = document.getElementById('gameCanvas');
        const gameCtx = gameCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // 初始化遊戲板
        function initBoard() {
            gameBoard = [];
            for (let i = 0; i < ROWS; i++) {
                gameBoard[i] = [];
                for (let j = 0; j < COLS; j++) {
                    gameBoard[i][j] = 0;
                }
            }
        }

        // 俄羅斯方塊物件
        class Tetromino {
            constructor(shapeIndex = null) {
                if (shapeIndex === null) {
                    shapeIndex = Math.floor(Math.random() * TETRIS_SHAPES.length);
                }
                this.shapeIndex = shapeIndex;
                this.shape = TETRIS_SHAPES[shapeIndex];
                this.color = COLORS[shapeIndex];
                this.x = Math.floor(COLS / 2) - 1;
                this.y = 0;
                this.rotation = 0;
            }

            getShape() {
                return this.shape;
            }

            rotate() {
                const shape = this.shape;
                const rows = shape.length;
                const cols = shape[0].length;
                const newShape = [];

                for (let i = 0; i < cols; i++) {
                    newShape[i] = [];
                    for (let j = rows - 1; j >= 0; j--) {
                        newShape[i][rows - 1 - j] = shape[j][i];
                    }
                }

                this.shape = newShape;
                this.rotation++;
            }

            rotateBack() {
                for (let i = 0; i < 3; i++) {
                    const shape = this.shape;
                    const rows = shape.length;
                    const cols = shape[0].length;
                    const newShape = [];

                    for (let i = 0; i < cols; i++) {
                        newShape[i] = [];
                        for (let j = rows - 1; j >= 0; j--) {
                            newShape[i][rows - 1 - j] = shape[j][i];
                        }
                    }
                    this.shape = newShape;
                }
            }
        }

        // 生成新方塊
        function generateNewPiece() {
            if (nextPiece === null) {
                currentPiece = new Tetromino();
                nextPiece = new Tetromino();
            } else {
                currentPiece = nextPiece;
                currentPiece.x = Math.floor(COLS / 2) - 1;
                currentPiece.y = 0;
                nextPiece = new Tetromino();
            }
        }

        // 檢查碰撞
        function checkCollision(piece, offsetX = 0, offsetY = 0) {
            const shape = piece.getShape();
            const x = piece.x + offsetX;
            const y = piece.y + offsetY;

            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        const boardX = x + col;
                        const boardY = y + row;

                        // 檢查邊界
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS) {
                            return true;
                        }

                        // 檢查與其他方塊的碰撞
                        if (boardY >= 0 && gameBoard[boardY][boardX]) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        // 移動方塊
        function movePiece(dx, dy = 0) {
            if (!checkCollision(currentPiece, dx, dy)) {
                currentPiece.x += dx;
                currentPiece.y += dy;
                return true;
            }
            return false;
        }

        // 旋轉方塊
        function rotatePiece() {
            currentPiece.rotate();
            if (checkCollision(currentPiece, 0, 0)) {
                // 左移或右移重試
                if (!checkCollision(currentPiece, -1, 0)) {
                    currentPiece.x -= 1;
                } else if (!checkCollision(currentPiece, 1, 0)) {
                    currentPiece.x += 1;
                } else if (!checkCollision(currentPiece, -2, 0)) {
                    currentPiece.x -= 2;
                } else if (!checkCollision(currentPiece, 2, 0)) {
                    currentPiece.x += 2;
                } else {
                    currentPiece.rotateBack();
                }
            }
        }

        // 放置方塊
        function placePiece() {
            const shape = currentPiece.getShape();
            const x = currentPiece.x;
            const y = currentPiece.y;

            for (let row = 0; row < shape.length; row++) {
                for (let col = 0; col < shape[row].length; col++) {
                    if (shape[row][col]) {
                        const boardY = y + row;
                        const boardX = x + col;

                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            gameBoard[boardY][boardX] = currentPiece.shapeIndex + 1;
                        }
                    }
                }
            }

            checkAndClearLines();
            generateNewPiece();

            // 檢查遊戲結束
            if (checkCollision(currentPiece, 0, 0)) {
                endGame();
            }
        }

        // 檢查並清除完整行
        function checkAndClearLines() {
            let linesCleared = 0;

            for (let row = ROWS - 1; row >= 0; row--) {
                let isComplete = true;
                for (let col = 0; col < COLS; col++) {
                    if (gameBoard[row][col] === 0) {
                        isComplete = false;
                        break;
                    }
                }

                if (isComplete) {
                    gameBoard.splice(row, 1);
                    gameBoard.unshift(new Array(COLS).fill(0));
                    linesCleared++;
                    row++; // 重新檢查這一行
                }
            }

            if (linesCleared > 0) {
                lines += linesCleared;
                // 積分系統：1行100，2行300，3行700，4行1500
                const points = [100, 300, 700, 1500];
                score += points[linesCleared - 1];
                updateLevel();
                updateUI();
            }
        }

        // 更新等級
        function updateLevel() {
            const newLevel = Math.floor(lines / 10) + 1;
            if (newLevel !== level) {
                level = newLevel;
                dropInterval = Math.max(100, 1000 - (level - 1) * 50);
            }
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }

        // 繪制遊戲板
        function drawBoard() {
            gameCtx.fillStyle = '#0a0e27';
            gameCtx.fillRect(0, 0, gameCanvas.width, gameCanvas.height);

            // 繪制網格
            gameCtx.strokeStyle = '#1a1a3f';
            gameCtx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                gameCtx.beginPath();
                gameCtx.moveTo(i * BLOCK_SIZE, 0);
                gameCtx.lineTo(i * BLOCK_SIZE, gameCanvas.height);
                gameCtx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                gameCtx.beginPath();
                gameCtx.moveTo(0, i * BLOCK_SIZE);
                gameCtx.lineTo(gameCanvas.width, i * BLOCK_SIZE);
                gameCtx.stroke();
            }

            // 繪制棋盤上的方塊
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (gameBoard[row][col] > 0) {
                        drawBlock(gameCtx, col, row, gameBoard[row][col] - 1);
                    }
                }
            }

            // 繪制當前方塊
            if (currentPiece) {
                const shape = currentPiece.getShape();
                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            drawBlock(gameCtx, currentPiece.x + col, currentPiece.y + row, currentPiece.shapeIndex);
                        }
                    }
                }
            }
        }

        // 繪制下一個方塊
        function drawNextPiece() {
            nextCtx.fillStyle = '#0a0e27';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (nextPiece) {
                const shape = nextPiece.getShape();
                const offsetX = (4 - shape[0].length) * BLOCK_SIZE / 2;
                const offsetY = (5 - shape.length) * BLOCK_SIZE / 2;

                for (let row = 0; row < shape.length; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        if (shape[row][col]) {
                            nextCtx.fillStyle = COLORS[nextPiece.shapeIndex];
                            nextCtx.fillRect(
                                offsetX + col * BLOCK_SIZE,
                                offsetY + row * BLOCK_SIZE,
                                BLOCK_SIZE - 2,
                                BLOCK_SIZE - 2
                            );
                            nextCtx.strokeStyle = '#fff';
                            nextCtx.lineWidth = 1;
                            nextCtx.strokeRect(
                                offsetX + col * BLOCK_SIZE,
                                offsetY + row * BLOCK_SIZE,
                                BLOCK_SIZE - 2,
                                BLOCK_SIZE - 2
                            );
                        }
                    }
                }
            }
        }

        // 繪制單個方塊
        function drawBlock(ctx, x, y, colorIndex) {
            ctx.fillStyle = COLORS[colorIndex];
            ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
        }

        // 遊戲循環
        function gameLoop(timestamp) {
            if (!gameRunning) return;

            if (!gamePaused && !gameOver) {
                dropCounter += 1;
                if (dropCounter > dropInterval / 16.67) {
                    if (!movePiece(0, 1)) {
                        placePiece();
                    }
                    dropCounter = 0;
                }
            }

            drawBoard();
            drawNextPiece();

            if (gameRunning) {
                requestAnimationFrame(gameLoop);
            }
        }

        // 開始遊戲
        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gameOver = false;
                gamePaused = false;
                initBoard();
                generateNewPiece();
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                document.getElementById('status').textContent = '遊戲進行中...';
                document.getElementById('status').classList.remove('game-over');
                requestAnimationFrame(gameLoop);
            }
        }

        // 暫停/繼續
        function togglePause() {
            if (gameRunning && !gameOver) {
                gamePaused = !gamePaused;
                const statusEl = document.getElementById('status');
                if (gamePaused) {
                    statusEl.textContent = '已暫停 - 按空格繼續';
                } else {
                    statusEl.textContent = '遊戲進行中...';
                }
            }
        }

        // 結束遊戲
        function endGame() {
            gameRunning = false;
            gameOver = true;
            const statusEl = document.getElementById('status');
            statusEl.textContent = `🎮 遊戲結束！最終分數: ${score}`;
            statusEl.classList.add('game-over');
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
        }

        // 重置遊戲
        function resetGame() {
            gameRunning = false;
            gameOver = false;
            gamePaused = false;
            score = 0;
            lines = 0;
            level = 1;
            dropInterval = 1000;
            gameBoard = [];
            currentPiece = null;
            nextPiece = null;
            updateUI();
            drawBoard();
            drawNextPiece();
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('status').textContent = '準備好了，點擊「開始遊戲」開始！';
            document.getElementById('status').classList.remove('game-over');
        }

        // 鍵盤控制
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gameOver) return;

            if (gamePaused && e.code !== 'Space' && e.key !== 'p' && e.key !== 'P') return;

            switch (e.code) {
                case 'ArrowLeft':
                    e.preventDefault();
                    movePiece(-1, 0);
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    movePiece(1, 0);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    movePiece(0, 1);
                    break;
                case 'Space':
                    e.preventDefault();
                    if (gamePaused) {
                        togglePause();
                    } else {
                        rotatePiece();
                    }
                    break;
            }

            if (e.key === 'p' || e.key === 'P') {
                e.preventDefault();
                togglePause();
            }
        });

        // 初始化
        initBoard();
        drawBoard();
        document.getElementById('pauseBtn').disabled = true;
    </script>
</body>
</html>
