<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 貪食蛇遊戲</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Arial', sans-serif;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.5);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .info-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 5px;
            min-width: 150px;
        }

        .info-item span {
            color: #00ff88;
            font-weight: bold;
            font-size: 1.5em;
        }

        canvas {
            border: 3px solid #00ff88;
            background: #000;
            margin: 20px 0;
            display: block;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .controls {
            margin: 20px 0;
            font-size: 1.1em;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            background: #00ff88;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: #00dd88;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            font-size: 1.2em;
            min-height: 30px;
            color: #ffff00;
        }

        .status.game-over {
            color: #ff4444;
            font-weight: bold;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .instructions {
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 5px;
            font-size: 0.9em;
            line-height: 1.6;
        }

        .key {
            background: rgba(0, 255, 136, 0.2);
            padding: 2px 8px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 貪食蛇遊戲</h1>
        
        <div class="info">
            <div class="info-item">分數: <span id="score">0</span></div>
            <div class="info-item">最高分: <span id="highScore">0</span></div>
        </div>

        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <div class="controls">
            <p>▲ ◄ ▼ ► 或 方向鍵 控制蛇的方向</p>
            <p><span class="key">空白鍵</span> 暫停/繼續</p>
        </div>

        <div class="button-group">
            <button onclick="startGame()">開始遊戲</button>
            <button onclick="togglePause()">暫停</button>
            <button onclick="resetGame()">重新開始</button>
        </div>

        <div class="status" id="status">準備好了嗎？點擊「開始遊戲」</div>

        <div class="instructions">
            <strong>遊戲規則：</strong><br>
            • 用方向鍵控制蛇的移動方向<br>
            • 🔴 紅色食物：增長 1 節身體<br>
            • 🔵 藍色食物：增長 2 節身體<br>
            • 撞到牆壁會從另一邊出現<br>
            • 撞到自己就遊戲結束<br>
            • 最高分會自動保存
        </div>
    </div>

    <script>
        // 遊戲配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 遊戲狀態
        let snake = [
            { x: 10, y: 10 }
        ];
        let food = { x: 15, y: 15, color: 'red' };
        let dx = 1;
        let dy = 0;
        let nextDx = 1;
        let nextDy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameRunning = false;
        let gamePaused = false;
        let gameSpeed = 200; // 初始速度（毫秒）
        let foodEaten = 0;
        let gameLoop;

        // 初始化高分顯示
        document.getElementById('highScore').textContent = highScore;

        // 鍵盤事件
        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            if (!gameRunning && (e.key === 'Enter' || e.key === ' ')) {
                startGame();
                return;
            }

            if (e.key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }

            const key = e.key.toLowerCase();
            const arrowUp = e.key === 'ArrowUp';
            const arrowDown = e.key === 'ArrowDown';
            const arrowLeft = e.key === 'ArrowLeft';
            const arrowRight = e.key === 'ArrowRight';

            // 使用 nextDx/nextDy 防止快速按鍵導致反向
            if (arrowUp || key === 'w') {
                if (dy === 0) { nextDx = 0; nextDy = -1; }
            } else if (arrowDown || key === 's') {
                if (dy === 0) { nextDx = 0; nextDy = 1; }
            } else if (arrowLeft || key === 'a') {
                if (dx === 0) { nextDx = -1; nextDy = 0; }
            } else if (arrowRight || key === 'd') {
                if (dx === 0) { nextDx = 1; nextDy = 0; }
            }
        }

        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                snake = [{ x: 10, y: 10 }];
                dx = 1;
                dy = 0;
                nextDx = 1;
                nextDy = 0;
                score = 0;
                foodEaten = 0;
                gameSpeed = 200;
                generateFood();
                updateScore();
                runGame();
            }
        }

        function togglePause() {
            if (gameRunning) {
                gamePaused = !gamePaused;
                document.getElementById('status').textContent = 
                    gamePaused ? '⏸ 遊戲已暫停' : '▶ 遊戲中...';
                if (!gamePaused) {
                    runGame();
                }
            }
        }

        function resetGame() {
            gameRunning = false;
            gamePaused = false;
            clearTimeout(gameLoop);
            document.getElementById('status').textContent = '準備好了嗎？點擊「開始遊戲」';
            draw();
        }

        function generateFood() {
            let newFood;
            let validPosition = false;
            
            while (!validPosition) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount),
                    color: Math.random() < 0.7 ? 'red' : 'blue' // 70% 紅色，30% 藍色
                };
                
                // 確保食物不在蛇身上
                validPosition = !snake.some(segment => 
                    segment.x === newFood.x && segment.y === newFood.y
                );
            }
            
            food = newFood;
        }

        function runGame() {
            if (!gameRunning || gamePaused) return;

            // 更新方向
            dx = nextDx;
            dy = nextDy;

            // 移動蛇頭
            const head = snake[0];
            let newHead = {
                x: head.x + dx,
                y: head.y + dy
            };

            // 撞牆環繞（穿過邊界）
            if (newHead.x < 0) newHead.x = tileCount - 1;
            if (newHead.x >= tileCount) newHead.x = 0;
            if (newHead.y < 0) newHead.y = tileCount - 1;
            if (newHead.y >= tileCount) newHead.y = 0;

            // 撞自己
            if (snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                endGame();
                return;
            }

            // 移動蛇
            snake.unshift(newHead);

            // 檢查是否吃到食物
            if (newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                foodEaten++;
                
                // 根據食物顏色決定增長長度
                if (food.color === 'blue') {
                    // 藍色食物增長 2 倍
                    snake.push({...snake[snake.length - 1]});
                }
                
                updateScore();
                generateFood();
            } else {
                // 移除尾部
                snake.pop();
            }

            draw();
            gameLoop = setTimeout(runGame, gameSpeed);
        }

        function endGame() {
            gameRunning = false;
            clearTimeout(gameLoop);
            
            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }

            document.getElementById('status').textContent = `💀 遊戲結束！最終分數：${score}`;
            document.getElementById('status').classList.add('game-over');
            draw();
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
            document.getElementById('status').textContent = '▶ 遊戲中...';
            document.getElementById('status').classList.remove('game-over');
        }

        function draw() {
            // 清除畫布 - 深藍色背景
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製網格
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 繪製蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇頭 - 亮綠色
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = 'rgba(0, 255, 136, 0.8)';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身 - 深綠色漸層
                    const fade = index / snake.length;
                    ctx.fillStyle = `rgba(0, ${200 - fade * 100}, ${136 - fade * 50}, 0.9)`;
                    ctx.shadowColor = 'rgba(0, 255, 136, 0.3)';
                    ctx.shadowBlur = 5;
                }
                
                ctx.fillRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2
                );
            });

            ctx.shadowColor = 'transparent';

            // 繪製食物
            if (food.color === 'blue') {
                // 藍色食物 - 更大的圓形
                ctx.fillStyle = '#4488ff';
                ctx.shadowColor = 'rgba(68, 136, 255, 0.8)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize / 2,
                    food.y * gridSize + gridSize / 2,
                    gridSize / 2 - 1,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                // 繪製外圈
                ctx.strokeStyle = '#88bbff';
                ctx.lineWidth = 2;
                ctx.stroke();
            } else {
                // 紅色食物
                ctx.fillStyle = '#ff4444';
                ctx.shadowColor = 'rgba(255, 68, 68, 0.8)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(
                    food.x * gridSize + gridSize / 2,
                    food.y * gridSize + gridSize / 2,
                    gridSize / 2 - 2,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }
            ctx.shadowColor = 'transparent';
        }

        // 初始繪製
        draw();
    </script>
</body>
</html>
