<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏮 方塊消消樂（中國風3D版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap');

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #8B0000 0%, #FFD700 50%, #8B0000 100%);
            font-family: 'Noto Serif TC', serif;
            color: #fff;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6),
                        inset 0 0 20px rgba(255, 215, 0, 0.2);
            border: 3px solid #FFD700;
            max-width: 900px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 3em;
            text-shadow: 3px 3px 0px rgba(0, 0, 0, 0.8),
                         6px 6px 0px rgba(139, 0, 0, 0.5);
            font-weight: 900;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 0.9em;
            color: #FFD700;
            margin-bottom: 20px;
            opacity: 0.9;
        }

        /* 傳統紋路背景 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255, 255, 255, 0.05) 10px, rgba(255, 255, 255, 0.05) 20px);
            border-radius: 15px;
            pointer-events: none;
        }

        .game-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .info-item {
            background: linear-gradient(135deg, rgba(139, 0, 0, 0.6), rgba(255, 215, 0, 0.2));
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #FFD700;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.2);
            transform: perspective(500px) rotateX(2deg);
            transition: all 0.3s;
        }

        .info-item:hover {
            transform: perspective(500px) rotateX(-2deg) translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .info-label {
            font-size: 0.85em;
            opacity: 0.8;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .info-value {
            color: #FFD700;
            font-weight: 900;
            font-size: 1.8em;
            margin-top: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .game-wrapper {
            display: flex;
            gap: 40px;
            justify-content: center;
            margin: 30px 0;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        canvas {
            border: 4px solid #FFD700;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.6),
                        inset 0 0 30px rgba(255, 215, 0, 0.1),
                        0 15px 35px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated;
            transform: perspective(1200px) rotateY(-5deg) rotateX(2deg);
            transition: all 0.3s;
        }

        canvas:hover {
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.8),
                        inset 0 0 40px rgba(255, 215, 0, 0.2),
                        0 20px 50px rgba(0, 0, 0, 0.9);
            transform: perspective(1200px) rotateY(-3deg) rotateX(0deg);
        }

        .next-piece {
            min-width: 150px;
            padding: 20px;
            background: linear-gradient(135deg, rgba(139, 0, 0, 0.4), rgba(255, 215, 0, 0.1));
            border: 2px solid #FFD700;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
        }

        .next-piece h3 {
            margin-bottom: 12px;
            font-size: 1.2em;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
        }

        #nextCanvas {
            border: 2px solid #FFD700;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            display: block;
            margin: 0 auto;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8),
                        0 4px 10px rgba(255, 215, 0, 0.3);
        }

        .controls {
            background: linear-gradient(135deg, rgba(139, 0, 0, 0.3), rgba(255, 215, 0, 0.1));
            padding: 20px;
            border-radius: 10px;
            margin: 25px 0;
            font-size: 0.95em;
            line-height: 1.8;
            border: 2px solid #FFD700;
            position: relative;
            z-index: 1;
        }

        .keyboard-info {
            opacity: 0.95;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        button {
            padding: 14px 32px;
            font-size: 1em;
            font-family: 'Noto Serif TC', serif;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #8B0000;
            border: 2px solid #8B0000;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 900;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4),
                        inset 0 -2px 5px rgba(0, 0, 0, 0.2);
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.5);
        }

        button:hover {
            background: linear-gradient(135deg, #FFA500, #FFD700);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.6),
                        inset 0 -2px 5px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(-1px);
            box-shadow: 0 3px 10px rgba(255, 215, 0, 0.4),
                        inset 0 -1px 3px rgba(0, 0, 0, 0.3);
        }

        button:disabled {
            background: linear-gradient(135deg, #666, #777);
            cursor: not-allowed;
            opacity: 0.5;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
        }

        .status {
            margin-top: 20px;
            font-size: 1.2em;
            min-height: 30px;
            color: #FFD700;
            font-weight: 900;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8),
                         0 0 10px rgba(255, 215, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .game-over {
            color: #FF6B6B;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8),
                        0 0 10px rgba(255, 107, 107, 0.8);
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 立體方塊效果 */
        .block-3d {
            perspective: 1000px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            canvas {
                max-width: 100%;
                height: auto;
                transform: perspective(1000px) rotateY(0deg) rotateX(0deg);
            }

            .game-info {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
            }

            .game-wrapper {
                flex-direction: column;
                gap: 20px;
            }

            .controls {
                font-size: 0.85em;
                line-height: 1.6;
            }

            button {
                padding: 10px 25px;
                font-size: 0.9em;
            }
        }

        /* 星點裝飾 */
        .decoration::before {
            content: '✦';
            color: #FFD700;
            margin: 0 10px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏮 方塊消消樂</h1>
        <div class="subtitle">中國風3D版</div>
        
        <div class="game-info">
            <div class="info-item">
                <div class="info-label">分 數</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">級 數</div>
                <div class="info-value" id="level">1</div>
            </div>
            <div class="info-item">
                <div class="info-label">消 除</div>
                <div class="info-value" id="lines">0</div>
            </div>
        </div>

        <div class="game-wrapper">
            <div class="block-3d">
                <canvas id="gameCanvas" width="200" height="400"></canvas>
            </div>
            <div class="next-piece">
                <h3>下一個稿</h3>
                <canvas id="nextCanvas" width="100" height="100"></canvas>
            </div>
        </div>

        <div class="controls">
            <div class="keyboard-info">
                <p>⬅️ 左移 • ➡️ 右移 • ⬇️ 下落</p>
                <p>🔄 空格 旋轉 • P 暫停</p>
            </div>
        </div>

        <div class="button-group">
            <button id="startBtn" onclick="startGame()">⚔️ 開 始</button>
            <button id="pauseBtn" onclick="togglePause()" disabled>⏸️ 暫 停</button>
            <button onclick="resetGame()">🔄 重 來</button>
        </div>

        <div class="status" id="status">準備好挑戰了嗎？點擊「開始」!</div>
    </div>

    <script>
        // === 遊戲配置 ===
        const COLS = 10;
        const ROWS = 20;
        const BLOCK_SIZE = 20;

        // 中國風配色：紅、黃、藍、綠、紫、青、橙
        const COLORS = [
            '#DC143C', // 深紅
            '#FFD700', // 金黃
            '#1E90FF', // 蔚藍
            '#228B22', // 森林綠
            '#8B008B', // 深紫
            '#00CED1', // 深青
            '#FF8C00'  // 深橙
        ];

        // 立體顏色版本（用於3D效果）
        const COLORS_DARK = [
            '#8B0000', // 深紅
            '#B8860B', // 深金黃
            '#00008B', // 深藍
            '#006400', // 深綠
            '#4B0082', // 深紫
            '#008B8B', // 深青
            '#8B4500'  // 深橙
        ];

        // 俄羅斯方塊形狀
        const TETRIS_SHAPES = [
            [[1, 1, 1, 1]],           // I
            [[1, 1], [1, 1]],         // O
            [[0, 1, 0], [1, 1, 1]],   // T
            [[1, 0], [1, 0], [1, 1]], // L
            [[0, 1], [0, 1], [1, 1]], // J
            [[0, 1, 1], [1, 1, 0]],   // S
            [[1, 1, 0], [0, 1, 1]]    // Z
        ];

        // === 遊戲狀態 ===
        let gameBoard = [];
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let lines = 0;
        let level = 1;
        let gameRunning = false;
        let gamePaused = false;
        let gameOver = false;
        let dropCounter = 0;
        let dropInterval = 1000;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');

        // === 初始化 ===
        function initGame() {
            gameBoard = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            level = 1;
            gameRunning = false;
            gamePaused = false;
            gameOver = false;
            dropInterval = 1000;
            currentPiece = getRandomPiece();
            nextPiece = getRandomPiece();
            updateUI();
            draw();
        }

        function getRandomPiece() {
            const shape = TETRIS_SHAPES[Math.floor(Math.random() * TETRIS_SHAPES.length)];
            const colorIdx = Math.floor(Math.random() * COLORS.length);
            return {
                shape: shape,
                color: COLORS[colorIdx],
                colorDark: COLORS_DARK[colorIdx],
                x: Math.floor(COLS / 2) - Math.floor(shape[0].length / 2),
                y: 0,
                rotation: 0
            };
        }

        // === 繪圖函數 ===
        function draw() {
            // 清除畫布
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 網格背景
            ctx.strokeStyle = 'rgba(255, 215, 0, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * BLOCK_SIZE, 0);
                ctx.lineTo(i * BLOCK_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * BLOCK_SIZE);
                ctx.lineTo(canvas.width, i * BLOCK_SIZE);
                ctx.stroke();
            }

            // 繪製已放置的方塊
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    if (gameBoard[row][col]) {
                        drawBlock3D(col, row, gameBoard[row][col], COLORS[gameBoard[row][col] - 1], COLORS_DARK[gameBoard[row][col] - 1]);
                    }
                }
            }

            // 繪製當前方塊
            if (currentPiece) {
                for (let row = 0; row < currentPiece.shape.length; row++) {
                    for (let col = 0; col < currentPiece.shape[row].length; col++) {
                        if (currentPiece.shape[row][col]) {
                            const x = currentPiece.x + col;
                            const y = currentPiece.y + row;
                            if (y >= 0) {
                                drawBlock3D(x, y, 1, currentPiece.color, currentPiece.colorDark);
                            }
                        }
                    }
                }
            }
        }

        function drawBlock3D(col, row, value, color, darkColor) {
            const x = col * BLOCK_SIZE;
            const y = row * BLOCK_SIZE;
            const size = BLOCK_SIZE - 2;

            // 主面
            ctx.fillStyle = color;
            ctx.fillRect(x + 1, y + 1, size, size);

            // 邊框
            ctx.strokeStyle = darkColor;
            ctx.lineWidth = 2;
            ctx.strokeRect(x + 1, y + 1, size, size);

            // 高光效果（左上角）
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fillRect(x + 2, y + 2, size / 3, size / 3);

            // 陰影效果（右下角）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(x + size - size / 3, y + size - size / 3, size / 3, size / 3);

            // 3D深度線
            ctx.strokeStyle = darkColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + 1 + size, y + 1);
            ctx.lineTo(x + 1 + size + 3, y + 1 - 3);
            ctx.moveTo(x + 1 + size, y + 1 + size);
            ctx.lineTo(x + 1 + size + 3, y + 1 + size - 3);
            ctx.stroke();
        }

        function drawNextPiece() {
            nextCtx.fillStyle = '#1a1a1a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);

            if (!nextPiece) return;

            const startX = (nextCanvas.width - nextPiece.shape[0].length * BLOCK_SIZE) / 2;
            const startY = (nextCanvas.height - nextPiece.shape.length * BLOCK_SIZE) / 2;

            for (let row = 0; row < nextPiece.shape.length; row++) {
                for (let col = 0; col < nextPiece.shape[row].length; col++) {
                    if (nextPiece.shape[row][col]) {
                        const x = startX + col * BLOCK_SIZE;
                        const y = startY + row * BLOCK_SIZE;
                        drawBlockSmall(x, y, nextPiece.color, nextPiece.colorDark);
                    }
                }
            }
        }

        function drawBlockSmall(x, y, color, darkColor) {
            const size = BLOCK_SIZE - 2;
            nextCtx.fillStyle = color;
            nextCtx.fillRect(x + 1, y + 1, size, size);
            nextCtx.strokeStyle = darkColor;
            nextCtx.lineWidth = 1.5;
            nextCtx.strokeRect(x + 1, y + 1, size, size);
            nextCtx.fillStyle = 'rgba(255, 255, 255, 0.2)';
            nextCtx.fillRect(x + 2, y + 2, size / 4, size / 4);
        }

        // === 遊戲邏輯 ===
        function canMove(piece, dx, dy) {
            for (let row = 0; row < piece.shape.length; row++) {
                for (let col = 0; col < piece.shape[row].length; col++) {
                    if (piece.shape[row][col]) {
                        const newX = piece.x + col + dx;
                        const newY = piece.y + row + dy;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) {
                            return false;
                        }

                        if (newY >= 0 && gameBoard[newY][newX]) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placePiece() {
            for (let row = 0; row < currentPiece.shape.length; row++) {
                for (let col = 0; col < currentPiece.shape[row].length; col++) {
                    if (currentPiece.shape[row][col]) {
                        const x = currentPiece.x + col;
                        const y = currentPiece.y + row;
                        if (y >= 0) {
                            const colorIdx = COLORS.indexOf(currentPiece.color) + 1;
                            gameBoard[y][x] = colorIdx;
                        }
                    }
                }
            }

            checkLines();
            currentPiece = nextPiece;
            nextPiece = getRandomPiece();
            drawNextPiece();

            if (!canMove(currentPiece, 0, 0)) {
                gameOver = true;
                gameRunning = false;
                document.getElementById('status').textContent = '遊戲結束！';
                document.getElementById('status').classList.add('game-over');
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
            }
        }

        function checkLines() {
            for (let row = ROWS - 1; row >= 0; row--) {
                if (gameBoard[row].every(cell => cell !== 0)) {
                    gameBoard.splice(row, 1);
                    gameBoard.unshift(Array(COLS).fill(0));
                    lines++;
                    score += 100 * level;
                    row++;
                }
            }

            if (lines % 10 === 0 && lines > 0) {
                level++;
                dropInterval = Math.max(100, dropInterval - 50);
            }

            updateUI();
        }

        function rotatePiece() {
            const originalShape = currentPiece.shape;
            currentPiece.shape = currentPiece.shape[0].map((_, i) =>
                currentPiece.shape.map(row => row[i]).reverse()
            );

            if (!canMove(currentPiece, 0, 0)) {
                currentPiece.shape = originalShape;
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }

        // === 控制 ===
        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                gameOver = false;
                document.getElementById('status').classList.remove('game-over');
                document.getElementById('status').textContent = '遊戲中...';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                gameLoop();
            }
        }

        function togglePause() {
            if (gameRunning) {
                gamePaused = !gamePaused;
                document.getElementById('pauseBtn').textContent = gamePaused ? '▶️ 繼 續' : '⏸️ 暫 停';
                document.getElementById('status').textContent = gamePaused ? '已暫停' : '遊戲中...';
                if (!gamePaused) gameLoop();
            }
        }

        function resetGame() {
            initGame();
            document.getElementById('status').classList.remove('game-over');
            document.getElementById('status').textContent = '準備好挑戰了嗎？點擊「開始」!';
            document.getElementById('startBtn').disabled = false;
            document.getElementById('pauseBtn').disabled = true;
            document.getElementById('pauseBtn').textContent = '⏸️ 暫 停';
        }

        function gameLoop() {
            if (!gameRunning || gamePaused) return;

            dropCounter += 16;
            if (dropCounter >= dropInterval) {
                dropCounter = 0;
                if (canMove(currentPiece, 0, 1)) {
                    currentPiece.y++;
                } else {
                    placePiece();
                }
            }

            draw();
            drawNextPiece();
            if (!gamePaused) requestAnimationFrame(gameLoop);
        }

        // === 鍵盤控制 ===
        document.addEventListener('keydown', (e) => {
            if (!gameRunning || gamePaused) return;

            if (e.key === 'ArrowLeft') {
                if (canMove(currentPiece, -1, 0)) currentPiece.x--;
                draw();
            } else if (e.key === 'ArrowRight') {
                if (canMove(currentPiece, 1, 0)) currentPiece.x++;
                draw();
            } else if (e.key === 'ArrowDown') {
                if (canMove(currentPiece, 0, 1)) currentPiece.y++;
                draw();
            } else if (e.key === ' ') {
                e.preventDefault();
                rotatePiece();
                draw();
            } else if (e.key.toLowerCase() === 'p') {
                e.preventDefault();
                togglePause();
            }
        });

        // === 初始化遊戲 ===
        initGame();
    </script>
</body>
</html>
